<!DOCTYPE html>
<html lang="en">
  <head>
    <title>An HTML Note</title>
    <style>body { color: red; }</style>
    <script>alert("xss")</script>
  </head>
  <body>
    <h1>An HTML Note</h1>
    <p>This note has <strong>bold</strong>, <em>italic</em>, and <u>underlined</u> text and a
      <a href="https://example.com/page">link</a>.</p>
    <h2>A list</h2>
    <ul>
      <li>First point</li>
      <li>Second point</li>
    </ul>
    <blockquote><p>Quoted wisdom.</p></blockquote>
    <pre><code>const x = 1;</code></pre>
    <img src="https://example.com/figure.png" alt="A figure caption" />
  </body>
</html>
