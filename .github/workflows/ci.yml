# Interleave CI — the gate the Definition of Done refers to.
#
# Everything runs in Docker via the same `make` targets developers use locally,
# so there is no reliance on a host Node/pnpm toolchain (CLAUDE.md: "All checks
# run inside Docker"). The job fails on a type error, a lint error, a unit-test
# failure, or a smoke-E2E failure — verified by temporarily introducing each.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: typecheck · lint · test · e2e (Docker)
    runs-on: ubuntu-latest
    # CI=true tightens config (Playwright forbidOnly + retries, no reuse of an
    # existing dev server). Compose forwards it into the containers.
    env:
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The runner already has Docker + Compose v2 + GNU Make; no host Node setup.
      - name: Show toolchain
        run: |
          docker --version
          docker compose version
          make --version | head -1

      - name: Build toolchain image (app)
        run: docker compose build app

      - name: Typecheck
        run: make typecheck

      - name: Lint
        run: make lint

      - name: Unit tests
        run: make test

      # First run pulls the ~2GB official Playwright image — expected.
      - name: Build E2E image
        run: docker compose build e2e

      - name: Smoke E2E
        run: make e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7
